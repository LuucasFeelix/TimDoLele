<div class="cardapio-mobile">

  <header class="topbar">
    <div class="back-icon">
      ←
    </div>

    <div>
      <h1>Nosso Cardápio</h1>
      <p>Tim do Lelê Lanches</p>
    </div>

    <button
      class="cart-icon"
      (click)="irCheckout()"
    >
      🛒
      <span>{{ quantidadeTotalCarrinho() }}</span>
    </button>
  </header>

  <section class="categorias-scroll">
    <button
      *ngFor="let categoria of categorias"
      [class.active]="categoriaSelecionada === categoria"
      (click)="selecionarCategoria(categoria)"
    >
      {{ categoria }}
    </button>
  </section>

  <main class="produtos-lista">

    <ng-container *ngFor="let cat of cardapioFiltrado">

      <h2 class="categoria-title">
        {{ cat.categoria }}
      </h2>

      <div
        *ngFor="let p of cat.produtos"
        class="produto-card"
      >
        <div class="produto-foto">
          🍔
        </div>

        <div class="produto-info">
          <h3>{{ p.nome }}</h3>

          <p>
            {{ p.descricao || 'Lanche artesanal preparado com ingredientes selecionados.' }}
          </p>

          <strong>
            R$ {{ p.preco }}
          </strong>
        </div>

        <button
          class="add-button"
          (click)="abrirProduto(p)"
        >
          +
        </button>
      </div>

    </ng-container>

  </main>

  <footer
    class="cart-footer"
    *ngIf="carrinho.length > 0"
  >
    <div>
      <span>{{ quantidadeTotalCarrinho() }} item(ns)</span>
      <strong>R$ {{ calcularTotal() }}</strong>
    </div>

    <button (click)="irCheckout()">
      Ver carrinho
    </button>
  </footer>

</div>

<app-produto-modal
  *ngIf="produtoSelecionado"
  [produto]="produtoSelecionado"
  (fechar)="fecharModal()"
  (adicionar)="adicionarAoCarrinho($event)">
</app-produto-modal>
